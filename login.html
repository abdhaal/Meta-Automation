<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Automation - Sign In</title>
    <!-- FontAwesome Icons for Social Logins -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Connecting External CSS File -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- LOGO SECTION -->
            <div class="login-logo">
                <i class="fa-solid fa-bolt login-logo-icon"></i>
                <span class="login-logo-text">IMA Automation</span>
            </div>
            
            <!-- HEADING -->
            <h2 class="login-heading">
                Welcome back! Please Sign in to Your Account.
            </h2>
            
            <!-- LOGIN FORM -->
            <form action="automation.html" method="GET">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" placeholder="Enter your email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" placeholder="Enter your password" class="form-input" id="passwordField" required>
                    <i class="fa-regular fa-eye-slash password-toggle" onclick="togglePassword()"></i>
                </div>
                
                <a href="#" class="forgot-password-link">Forgot Password?</a>
                
                <button type="submit" class="btn-submit">
                    Sign In <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            
            <p class="signup-text">
                Don't have an account? <a href="#">Sign Up</a>
            </p>
            
            <!-- OR DIVIDER -->
            <div class="divider-container">OR</div>
            
            <!-- SOCIAL LOGINS -->
            <div class="social-btn-group">
                <button class="btn-social">
                    <i class="fa-brands fa-google icon-google"></i> Login with Google
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-facebook icon-facebook"></i> Login with Facebook
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-apple icon-apple"></i> Login with Apple
                </button>
            </div>
            
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
