<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Automation Login</title>
    <!-- Connecting External Login CSS -->
    <link rel="stylesheet" href="css/login.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="login-box">
    <h1>⚡ IMA Automation</h1>
    <!-- Heading with an ID to change dynamically -->
    <h2 id="authHeading">Welcome back! Please Sign in to Your Account.</h2>

    <form id="authForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <div class="password-box">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fa-solid fa-eye-slash" id="togglePassword"></i>
        </div>

        <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>

        <!-- Submit Button with an ID -->
        <button type="submit" class="login-btn" id="submitBtn">
            Sign In <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <!-- Toggle Action Container -->
    <p class="signup" id="toggleTextParagraph">
        Don't have an account? <a href="#" id="toggleAuthMode">Sign Up</a>
    </p>

    <div class="divider">
        <span>OR</span>
    </div>

    <button class="social google">
        <i class="fab fa-google"></i> Login with Google
    </button>
    <button class="social facebook">
        <i class="fab fa-facebook"></i> Login with Facebook
    </button>
    <button class="social apple">
        <i class="fab fa-apple"></i> Login with Apple
    </button>
</div>

<!-- Connecting External Script File -->
<script src="login.js"></script>
</body>
</html>
